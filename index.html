<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Escola Profissional</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f2f2;
}

/* MENU */
header{
    background:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 40px;
}

nav a{
    margin:0 10px;
    text-decoration:none;
    color:#444;
    font-weight:bold;
}

.logo img{
    height:50px;
}

/* BOTÕES */

.botoes button{
    border:none;
    padding:10px 18px;
    margin-left:10px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}

.inscricao{background:#0f8a8a;}
.alojamento{background:#1abc9c;}
.avaliacao{background:#7dbd2f;}


/* TITULO */

.titulo{
    text-align:center;
    margin:40px 0;
    font-size:30px;
    font-weight:bold;
}

/* CURSOS */

.cursos{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:10px;
    padding:0 40px;
}

.curso{
    position:relative;
}

.curso img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.curso span{
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    font-weight:bold;
    font-size:18px;
}


/* EMPREGOS */

.empregos{
    margin:60px 40px;
    text-align:center;
}

.empregos img{
    width:100%;
    max-height:350px;
    object-fit:cover;
}

.empregos button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#4aa3a3;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>

<div class="logo">
<img src="Ativo-1-1024x272.png">
</div>

<nav>
<a href="#">Escola</a>
<a href="#">Informações</a>
<a href="#">Instalações</a>
<a href="#">Contactos</a>
</nav>

<div class="botoes">
<button class="inscricao">INSCRIÇÃO</button>
<button class="alojamento">ALOJAMENTO</button>
<button class="avaliacao">AVALIAÇÃO EXTERNA IGEC</button>
</div>

</header>


<div class="titulo">
OS NOSSOS CURSOS, A TUA ESCOLHA!
</div>


<div class="cursos">

<div class="curso">
<img src="comunicação.png">

</div>

<div class="curso">
<img src="Informatica.png">

</div>

<div class="curso">
<img src="mecanica.png">

</div>

<div class="curso">
<img src="multimedia.png">

</div>

<div class="curso">
<img src="saude.png">

</div>

</div>


<div class="empregos">

<h2>O SUCESSO CONTINUA: OPORTUNIDADES DE EMPREGO</h2>

<img src="JOB.jpg">

<br>

<button>Consultar ofertas</button>

</div>

</body>
</html>
